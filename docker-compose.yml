services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bookhub
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bookhub"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/bookhub?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      OTP_SECRET: ${OTP_SECRET:-change-me-too}
      OTP_EXPIRES_MINUTES: ${OTP_EXPIRES_MINUTES:-2}
      OTP_RESEND_COOLDOWN_SECONDS: ${OTP_RESEND_COOLDOWN_SECONDS:-60}
      SMS_PROVIDER: ${SMS_PROVIDER:-}
      SMS_API_KEY: ${SMS_API_KEY:-}
      SMS_TEMPLATE_ID: ${SMS_TEMPLATE_ID:-839779}
      SMS_SENDER: ${SMS_SENDER:-}
      MAX_PROFILE_IMAGE_MB: ${MAX_PROFILE_IMAGE_MB:-2}
      DB_RESET_ON_SCHEMA_CHANGE: ${DB_RESET_ON_SCHEMA_CHANGE:-true}
      REDIS_URL: redis://redis:6379
      TZ: ${TZ:-Asia/Tehran}
    ports:
      - "3000:3000"
    volumes:
      - appmeta:/app/.runtime
      - appuploads:/app/public/uploads

volumes:
  pgdata:
  appmeta:
  appuploads:
  redisdata:


